# Drop this file into your repo's .github/workflows/ to run the tooling
# contract check on every PR.
#
# Requires the consuming repo to have @kingym88/marketing-engine-tooling
# installed as a devDependency and a NODE_AUTH_TOKEN secret configured
# for pulling from GitHub Packages.
name: tooling-check

on:
  pull_request:
    branches: [main]

jobs:
  check-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@kingym88"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      # Includes the ecosystem-currency rule (rule 13). TOOLING_CHECK_ECOSYSTEM_CURRENT=1
      # turns on the registry-backed check that every ecosystem pin is the latest
      # published; NODE_AUTH_TOKEN lets `npm view` reach GitHub Packages.
      #
      # Monorepos: run once per package.json that pins ecosystem deps, e.g.
      #   pnpm exec check-tooling .
      #   pnpm exec check-tooling apps/admin
      - name: Run tooling check (incl. ecosystem currency)
        run: pnpm exec check-tooling
        env:
          TOOLING_CHECK_ECOSYSTEM_CURRENT: "1"
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
